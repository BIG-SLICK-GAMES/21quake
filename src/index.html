<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>21 Stack'em Quake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="workspace" aria-label="21 Stack'em Quake game">
      <section class="phone-template" aria-label="Locked portrait game screen">
        <header class="header component-module" data-component="Header">
          <div class="score-panel" aria-label="Score">
            <div class="score-label">Score</div>
            <div class="score-value" id="scoreValue">0</div>
          </div>
          <h1>Quake</h1>
          <div class="header-actions">
            <button class="icon-button" id="pauseButton" type="button" aria-label="Pause">II</button>
            <button class="icon-button" id="resetButton" type="button" aria-label="Reset">X</button>
          </div>
        </header>

        <section class="timer component-module" data-component="Timer" aria-label="Next quake timer">
          <div class="progress-track quake-progress" id="timerPanel">
            <div class="ticks quake-ticks" id="timerTicks" aria-hidden="true"></div>
          </div>
        </section>

        <section class="board-zone component-module" data-component="Game Board" aria-label="Game board">
          <div class="quake-board-frame">
            <div class="quake-board" id="board" aria-label="5 by 5 quake board"></div>
          </div>
        </section>

        <section class="rack component-module" data-component="Tile Rack" aria-label="Tile rack">
          <div class="rack-inner" id="selectedHold"></div>
        </section>

        <section class="instructions-panel component-module" data-component="Instructions" aria-label="Instructions">
          <button class="instructions-arrow instructions-arrow-up" type="button" aria-label="Previous instruction">&#9650;</button>
          <button class="instructions-arrow instructions-arrow-down" type="button" aria-label="Next instruction">&#9660;</button>
          <div class="instructions-screen" id="instructionsScreen" aria-live="polite"></div>
          <button class="quake-button" id="quakeButton" type="button" aria-label="Trigger quake">QUAKE</button>
        </section>
      </section>
    </main>

    <script src="./dev-reload.js"></script>
    <script type="module" src="./game.js"></script>
  </body>
</html>
